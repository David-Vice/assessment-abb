[project]
name = "abb-contracts"
version = "0.1.0"
description = "Shared Pydantic boundary models for the ABB RAG platform"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["abb_contracts"]
