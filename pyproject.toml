[dependency-groups]
dev = [
    "ruff>=0.8",
    "mypy>=1.13",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "fakeredis>=2.26",
]

[tool.uv.workspace]
members = [
    "packages/contracts",
    "libs/rag",
    "apps/ingestion",
    "apps/chat",
    "apps/analytics",
    "apps/scraper",
    "eval",
]

[tool.uv.sources]
abb-contracts = { workspace = true }
abb-rag-core = { workspace = true }
abb-chat = { workspace = true }
abb-eval = { workspace = true }

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".venv", "apps/web"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "ASYNC", "S", "Q", "COM", "SIM", "PTH"]
ignore = ["COM812"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
warn_return_any = true
no_implicit_optional = true
plugins = ["pydantic.mypy"]
exclude = ["apps/web", "\\.venv"]

# trafilatura, lxml, and py3langid ship no type stubs.
[[tool.mypy.overrides]]
module = ["trafilatura", "trafilatura.*", "lxml", "lxml.*", "py3langid", "py3langid.*"]
ignore_missing_imports = true

# sentence-transformers (the reranker) ships no type stubs.
[[tool.mypy.overrides]]
module = ["sentence_transformers", "sentence_transformers.*"]
ignore_missing_imports = true

# ragas / datasets ship incomplete stubs for CI mypy.
[[tool.mypy.overrides]]
module = ["ragas", "ragas.*", "datasets", "datasets.*"]
ignore_missing_imports = true

# abb_chat is a workspace package without py.typed.
[[tool.mypy.overrides]]
module = ["abb_chat", "abb_chat.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages", "libs", "apps", "eval"]
norecursedirs = ["node_modules", ".venv", "apps/web", "dist", "build"]
python_files = ["test_*.py"]
